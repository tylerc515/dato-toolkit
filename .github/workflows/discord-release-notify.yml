name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (prints payload, does not post to Discord)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ANALYST_ROLE_ID: ${{ secrets.DISCORD_ANALYST_ROLE_ID }}
        run: |
          python scripts/notify_discord_release.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
